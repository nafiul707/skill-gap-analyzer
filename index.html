<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Gap Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Skill Gap Analyzer</h1>
        <div class="card">
            <form id="skillForm">
                <label for="role">Select Job Role:</label>
                <select name="role" id="role" required>
                    <option value="">Choose a role</option>
                    <option value="frontend">Frontend Developer</option>
                    <option value="backend">Backend Developer</option>
                </select>

                <label>Select Your Current Skills:</label>
                <div class="skills">
                    <label><input type="checkbox" name="skills" value="HTML"> HTML</label>
                    <label><input type="checkbox" name="skills" value="CSS"> CSS</label>
                    <label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
                    <label><input type="checkbox" name="skills" value="React"> React</label>
                    <label><input type="checkbox" name="skills" value="Node.js"> Node.js</label>
                    <label><input type="checkbox" name="skills" value="API"> API</label>
                    <label><input type="checkbox" name="skills" value="Database"> Database</label>
                </div>

                <div class="button-group">
                    <button type="submit">Analyze Skills</button>
                    <button type="button" id="resetBtn">Reset</button>
                </div>
            </form>

            <div id="results" class="results-card" style="display: none;">
                <h2 id="selectedRole"></h2>
                <h3>Matched Skills:</h3>
                <ul id="matchedSkills"></ul>
                <h3>Missing Skills:</h3>
                <ul id="missingSkills"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
